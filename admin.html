<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Admin - Online Users</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h2 {
      margin-bottom: 10px;
    }
    #count {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f2f2f2;
    }
    .online {
      color: green;
      font-weight: bold;
    }
    .offline {
      color: gray;
    }
  </style>
</head>

<body>

<h2>在线用户监控</h2>
<div id="count">在线人数：0</div>

<table>
  <thead>
    <tr>
      <th>用户名</th>
      <th>当前页面</th>
      <th>最后活动</th>
      <th>状态</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* Firebase 配置（替换成你的） */
const firebaseConfig = {
  apiKey: "AIzaSyASAC8WqQrH0kVvjFhd2D5HROaqio3ZVx4",
  authDomain: "project-check-63622.firebaseapp.com",
  projectId: "project-check-63622",
  appId: "1:273888390558:web:f0aca787d77f0ee6b93a8f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");
const count = document.getElementById("count");

/* 判断是否在线（5分钟规则） */
function isOnline(lastActive) {
  return Date.now() - lastActive < 5 * 60 * 1000;
}

/* 实时监听数据库 */
onSnapshot(collection(db, "online_users"), (snapshot) => {
  let onlineCount = 0;
  list.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    const online = isOnline(data.lastActive);

    if (online) onlineCount++;

    const row = `
      <tr>
        <td>${data.username || "-"}</td>
        <td>${data.page || "-"}</td>
        <td>${new Date(data.lastActive).toLocaleString()}</td>
        <td class="${online ? 'online' : 'offline'}">
          ${online ? "在线" : "离线"}
        </td>
      </tr>
    `;

    list.innerHTML += row;
  });

  count.textContent = "在线人数：" + onlineCount;
});
</script>

</body>
</html>
